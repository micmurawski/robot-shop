apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: application
  labels:
    service: catalogue
    app: catalogue
spec:
  replicas: 1
  selector:
    matchLabels:
      service: catalogue
  template:
    metadata:
      labels:
        service: catalogue
        app: catalogue
    spec:
      containers:
      - name: catalogue
        image: ${REPO}/robot-shop-catalogue:${TAG}
        imagePullPolicy: Always
        env:
          - name: INSTANA_AGENT_HOST
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 10
        resources:
          limits:
            cpu: 200m
            memory: 100Mi
          requests:
            cpu: 100m
            memory: 50Mi
      restartPolicy: Always  
---
apiVersion: v1
kind: Service
metadata:
  labels:
    service: catalogue
    app: catalogue
  name: catalogue
  namespace: application
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    service: catalogue
    app: catalogue
