apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: application
  labels:
    service: payment
    app: payment
    stage: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      service: payment
      stage: prod
  template:
    metadata:
      labels:
        service: payment
        app: payment
        stage: prod
    spec:
      containers:
      - name: payment
        image: ${REPO}/robot-shop-payment:${TAG}
        imagePullPolicy: Always
        # agent networking access
        env:
          - name: INSTANA_AGENT_HOST
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 10
        resources:
          limits:
            cpu: 200m
            memory: 100Mi
          requests:
            cpu: 100m
            memory: 50Mi
      restartPolicy: Always
  
--- 

apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: application
  labels:
    service: payment
    app: payment
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    service: payment
    app: payment

